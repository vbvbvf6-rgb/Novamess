    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root { color-scheme: dark; }

      html, body {
        width: 100%; height: 100%;
        background: #0a0a0f;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* ── Splash screen ─────────────────────────────────── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        overflow: hidden;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                    transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #splash.fade-out {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }

      /* radial background glow */
      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 50% 45%, rgba(255,148,51,0.09) 0%, transparent 70%),
          radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255,92,26,0.06) 0%, transparent 60%);
        pointer-events: none;
      }

      /* grid lines */
      #splash::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
        pointer-events: none;
      }

      /* ── Canvas for particles ──────────────────────────── */
      #splash-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* ── Logo wrap ─────────────────────────────────────── */
      .splash-logo-wrap {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        animation: splash-rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(24px) scale(0.92); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }

      /* ── Icon ──────────────────────────────────────────── */
      .splash-icon {
        position: relative;
        width: 104px;
        height: 104px;
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splash-pulse 3s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.04); }
      }

      /* glow ring behind icon */
      .splash-icon::before {
        content: '';
        position: absolute;
        inset: -14px;
        border-radius: 42px;
        background: radial-gradient(circle, rgba(255,148,51,0.28) 0%, transparent 70%);
        animation: splash-glow 3s ease-in-out infinite;
      }
      @keyframes splash-glow {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.12); }
      }

      /* outer ring */
      .splash-icon::after {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 30px;
        background: linear-gradient(135deg, rgba(255,209,102,0.35), rgba(255,92,26,0.15), transparent 60%);
        border: 1px solid rgba(255,148,51,0.22);
      }

      .splash-icon svg {
        width: 104px;
        height: 104px;
        border-radius: 28px;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 8px 24px rgba(255,100,0,0.45)) drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      }

      /* ── Wordmark ──────────────────────────────────────── */
      .splash-wordmark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .splash-title {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -1.5px;
        line-height: 1;
        background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.75) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .splash-sub {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.32);
      }

      /* ── Loading bar ───────────────────────────────────── */
      .splash-loader {
        margin-top: 52px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        animation: splash-rise 1s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .splash-bar-track {
        width: 140px;
        height: 2px;
        background: rgba(255,255,255,0.07);
        border-radius: 2px;
        overflow: hidden;
      }

      .splash-bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        background: linear-gradient(90deg, #ff9433, #ffd166);
        box-shadow: 0 0 8px rgba(255,148,51,0.6);
        animation: splash-fill 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes splash-fill {
        0%   { width: 0%; }
        40%  { width: 55%; }
        70%  { width: 78%; }
        90%  { width: 91%; }
        100% { width: 100%; }
      }

      .splash-hint {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: rgba(255,255,255,0.2);
      }
    </style>

  <body>
    <script>
      /* Restore theme before paint */
      (function(){
        var t = localStorage.getItem('pulse-theme');
        document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
      })();
    </script>

    <!-- ── Splash screen ─────────────────────────────────── -->
    <div id="splash" aria-hidden="true">
      <canvas id="splash-canvas"></canvas>

      <div class="splash-logo-wrap">
        <div class="splash-icon">
          <!-- Inline the favicon SVG for zero-latency render -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#ffd166"/>
                <stop offset="35%"  stop-color="#ff9433"/>
                <stop offset="70%"  stop-color="#ff5c1a"/>
                <stop offset="100%" stop-color="#d63600"/>
              </linearGradient>
              <linearGradient id="shine" x1="5%" y1="5%" x2="55%" y2="55%">
                <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.65"/>
                <stop offset="70%"  stop-color="#ffffff" stop-opacity="0.10"/>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="starGrad" x1="50%" y1="13%" x2="50%" y2="87%" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
              </linearGradient>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
                <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#c83000" flood-opacity="0.5"/>
              </filter>
            </defs>
            <rect x="3" y="3" width="94" height="94" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
            <rect x="3" y="3" width="94" height="94" rx="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
            <path d="M50 13 C50 13 54.5 41 87 50 C54.5 59 50 87 50 87 C50 87 45.5 59 13 50 C45.5 41 50 13 50 13Z"
              fill="url(#starGrad)" filter="url(#glow)"/>
            <path d="M50 13 C50 13 54.5 41 87 50 C54.5 59 50 87 50 87 C50 87 45.5 59 13 50 C45.5 41 50 13 50 13Z"
              fill="url(#shine)"/>
            <circle cx="50" cy="50" r="5.5" fill="white" opacity="0.95"/>
            <circle cx="50" cy="50" r="2.5" fill="white" opacity="1"/>
            <ellipse cx="37" cy="27" rx="15" ry="9" fill="white" opacity="0.12" transform="rotate(-20 37 27)"/>
          </svg>
        </div>

        <div class="splash-wordmark">
          <span class="splash-title">Nova</span>
          <span class="splash-sub">Мессенджер нового поколения</span>
        </div>
      </div>

      <div class="splash-loader">
        <div class="splash-bar-track">
          <div class="splash-bar-fill"></div>
        </div>
        <span class="splash-hint">Загрузка…</span>
      </div>
    </div>

    <!-- ── App root ──────────────────────────────────────── -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      /* Floating star-particle canvas */
      (function () {
        var canvas = document.getElementById('splash-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var W, H, particles = [], raf;
        var destroyed = false;

        function resize() {
          W = canvas.width  = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }

        function rand(a, b) { return a + Math.random() * (b - a); }

        function spawn() {
          return {
            x: rand(0, W), y: rand(0, H),
            r: rand(0.5, 2.2),
            o: rand(0.04, 0.22),
            speed: rand(0.05, 0.22),
            phase: rand(0, Math.PI * 2),
            drift: rand(-0.12, 0.12),
          };
        }

        function init() {
          resize();
          particles = [];
          var count = Math.min(Math.floor((W * H) / 8000), 90);
          for (var i = 0; i < count; i++) particles.push(spawn());
        }

        function draw(t) {
          if (destroyed) return;
          ctx.clearRect(0, 0, W, H);
          var ts = t / 1000;
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.y -= p.speed;
            p.x += p.drift;
            if (p.y < -4) { p.y = H + 4; p.x = rand(0, W); }
            if (p.x < -4 || p.x > W + 4) { p.x = rand(0, W); p.y = rand(0, H); }
            var pulse = 0.5 + 0.5 * Math.sin(ts * 1.4 + p.phase);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,200,100,' + (p.o * (0.5 + 0.5 * pulse)) + ')';
            ctx.fill();
          }
          raf = requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        raf = requestAnimationFrame(draw);

        /* Hide splash once React has mounted */
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            observer.disconnect();
            destroyed = true;
            cancelAnimationFrame(raf);
            var splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('fade-out');
              setTimeout(function () {
                if (splash.parentNode) splash.parentNode.removeChild(splash);
              }, 620);
            }
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });

        /* Safety: force-hide after 8 s even if React never mounts */
        setTimeout(function () {
          destroyed = true;
          cancelAnimationFrame(raf);
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(function () {
              if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
            }, 620);
          }
        }, 8000);
      })();
    </script>
