services:
  - type: web
    name: nova-messenger
    runtime: node
    # Render обнаружит Node.js автоматически по package.json
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build && BASE_PATH=/ pnpm --filter @workspace/pulse run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    plan: free
    healthCheckPath: /api/health
    # Render автоматически задаёт PORT, DATABASE_URL читается из envVars
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # ── Обязательно ──────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false          # вставь вручную в Render Dashboard (из Supabase)

      - key: JWT_SECRET
        generateValue: true  # Render сгенерирует сам

      # ── По желанию ───────────────────────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false   # задай вручную в Render Dashboard — должен совпадать с VAPID_PRIVATE_KEY

      - key: VAPID_PRIVATE_KEY
        sync: false   # секрет — только через Render Dashboard, никогда не в render.yaml

      - key: VAPID_EMAIL
        sync: false   # например: mailto:admin@nova.app

      # TURN для звонков — если не заданы, используется встроенный openrelay (бесплатно, без регистрации)
      - key: TURN_URL
        sync: false
      - key: TURN_USER
        sync: false
      - key: TURN_CRED
        sync: false

      # ── Объектное хранилище для медиа (фото/видео/голос/аватары/истории) ───
      # Без этих переменных медиа хранится прямо в Postgres как base64 и база
      # быстро заканчивается. С ними — файлы уходят в S3-совместимое хранилище
      # (Cloudflare R2, Backblaze B2, Supabase Storage и т.п.), а в базе остаётся
      # только ссылка. См. DEPLOY.md, раздел "Объектное хранилище".
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL_BASE
        sync: false
      - key: S3_REGION
        sync: false
